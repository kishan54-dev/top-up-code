<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>
<link rel="stylesheet" href="ep.css">
<link rel="stylesheet" href="media.css">
</head>


<body>

<div class="profile-card">

  <img id="preview" class="avatar">

  <input type="file" id="file" accept="image/*">
  <input type="text" id="name" placeholder="Enter Name">

  <button onclick="save()">Save</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyABYByDW8bAOCHfCwcRNaSN1wwifQEhzA4",
  authDomain: "freefiretopup-bbb23.firebaseapp.com",
  projectId: "freefiretopup-bbb23",
  storageBucket: "freefiretopup-bbb23.firebasestorage.app",
  messagingSenderId: "305435218774",
  appId: "1:305435218774:web:d258e8218bd1bdec50fcf7",
  measurementId: "G-HLNGZ236PZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let imageData = "";
let currentUID = "";

onAuthStateChanged(auth, (user) => {
  if(user){
    currentUID = user.uid;

    let name = localStorage.getItem(currentUID + "_name");
    let img = localStorage.getItem(currentUID + "_img");

    if(name){
      document.getElementById("name").value = name;
    }

    if(img){
      document.getElementById("preview").src = img;
    }
  } else {
    window.location.href = "index.html";
  }
});

document.getElementById("file").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    imageData = reader.result;
    document.getElementById("preview").src = imageData;
  }

  if(file){
    reader.readAsDataURL(file);
  }
});

window.save = function(){
  let name = document.getElementById("name").value;

  localStorage.setItem(currentUID + "_name", name);

  if(imageData){
    localStorage.setItem(currentUID + "_img", imageData);
  }

  window.location.href = "profile.html";
}

</script>

</body>
</html>
