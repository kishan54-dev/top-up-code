<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  font-family: Arial;
  background: #52717e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.profile-container{
  background: #000000;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.profile-img-box img{
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
}

button{
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: #569ca1;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

input{
  width: 90%;
  margin: 8px 0;
  padding: 8px;
}
</style>

</head>

<body>
  
  <script>

// 🔐 check user login
let userId = localStorage.getItem("userId");

if (!userId) {
  window.location.href = "index.html";
} else {
  console.log("User logged in:", userId);
}

</script>

<div class="profile-container">

  <!-- Image -->
  <div class="profile-img-box">
    <img id="profilePic" src="https://via.placeholder.com/100">
    <input type="file" id="upload" hidden>
    <br>
    <button onclick="uploadImg()">Change Photo</button>
  </div>

  <!-- Info -->
  <div class="profile-info">
    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email">
    <button onclick="saveProfile()">Save Changes</button>
  </div>

</div>

<script src="profile.js"></script>

</body>
</html>
