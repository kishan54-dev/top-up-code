<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="ep.css">
<link rel="stylesheet" href="media.css">
</head>

<body>

<div class="profile-card">
  <img id="profileImage" class="avatar">
  <h2 id="username">User Name</h2>

  <button onclick="editProfile()">Edit Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 UN FIREBASE CONFIG ADD PANNU
const firebaseConfig = {
  apiKey: "AIzaSyABYByDW8bAOCHfCwcRNaSN1wwifQEhzA4",
  authDomain: "freefiretopup-bbb23.firebaseapp.com",
  projectId: "freefiretopup-bbb23",
  storageBucket: "freefiretopup-bbb23.firebasestorage.app",
  messagingSenderId: "305435218774",
  appId: "1:305435218774:web:d258e8218bd1bdec50fcf7",
  measurementId: "G-HLNGZ236PZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(user){
    let uid = user.uid;

    let name = localStorage.getItem(uid + "_name");
    let img = localStorage.getItem(uid + "_img");

    if(name){
      document.getElementById("username").innerText = name;
    }

    if(img){
      document.getElementById("profileImage").src = img;
    } else {
      document.getElementById("profileImage").src = "";
    }

  } else {
    window.location.href = "index.html";
  }
});

window.logout = function(){
  signOut(auth);
  window.location.href = "index.html";
}

window.editProfile = function(){
  window.location.href = "edit.html";
}

</script>

</body>
</html>
