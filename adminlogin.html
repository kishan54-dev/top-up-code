<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Login</title>
<link rel="stylesheet" href="media.css">
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

<div class="neon-bg"></div>
<style>
.neon-bg{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,255,.12), transparent 20%),
radial-gradient(circle at 80% 30%, rgba(140,0,255,.15), transparent 20%),
radial-gradient(circle at 50% 80%, rgba(255,0,200,.10), transparent 20%);
animation: pulseBg 6s infinite alternate;
z-index:-1;
}
@keyframes pulseBg{
from{transform:scale(1);}
to{transform:scale(1.08);}
}
</style>


  <div class="login-box">
    <h2>Admin Login 🔐</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
  </div>

  <!-- Firebase + Login Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABYByDW8bAOCHfCwcRNaSN1wwifQEhzA4",
      authDomain: "freefiretopup-bbb23.firebaseapp.com",
      projectId: "freefiretopup-bbb23",
      storageBucket: "freefiretopup-bbb23.firebasestorage.app",
      messagingSenderId: "305435218774",
      appId: "1:305435218774:web:d258e8218bd1bdec50fcf7",
      measurementId: "G-HLNGZ236PZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "joythas13@gmail.com"; // 🔥 change this
    const ADMIN_PASSWORD = "kishan"; // 🔥 change this

    window.login = function () {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {

          if (email === ADMIN_EMAIL) {
            localStorage.setItem("admin", "true");
            window.location.href = "admin.html";
          } else {
            alert("You are not admin ❌");
          }

        })
        .catch((error) => {
          alert(error.message);
        });
    };
  </script>

</body>
</html>
