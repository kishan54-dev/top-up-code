<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PHOENIX TK</title>
<link rel="stylesheet" href="index.css">
<link rel="icon" href="1.jpg">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>Create Account</h2>
      <p>Sign up to continue</p>
    </div>

    <form id="registerForm" class="login-form">

      <div class="form-group">
        <div class="input-group neu-input">
          <input type="email" id="email" required placeholder=" ">
          <label>Email address</label>
        </div>
      </div>

      <div class="form-group">
        <div class="input-group neu-input">
          <input type="password" id="password" required placeholder=" ">
          <label>Password</label>
        </div>
      </div>

      <button type="submit" class="neu-button login-btn">
        Create Account
      </button>

      <!-- ✅ FIXED success message -->
      <p id="successMsg" class="success-msg" style="display:none; color:rgb(255, 0, 0);">
        Account Created Successfully ✅
      </p>

    </form>

    <div class="signup-link">
      <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

  </div>
</div>

<!-- 🔥 Firebase Register Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyABYByDW8bAOCHfCwcRNaSN1wwifQEhzA4",
  authDomain: "freefiretopup-bbb23.firebaseapp.com",
  projectId: "freefiretopup-bbb23",
  storageBucket: "freefiretopup-bbb23.firebasestorage.app",
  messagingSenderId: "305435218774",
  appId: "1:305435218774:web:d258e8218bd1bdec50fcf7"
};

// ✅ Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ Elements
const form = document.getElementById("registerForm");
const msg = document.getElementById("successMsg");

// ✅ Submit
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.querySelector("#email").value.trim();
  const password = document.querySelector("#password").value.trim();

  if (password.length < 6) {
    alert("Password must be at least 6 characters");
    return;
  }

  try {
    // 🔥 Create user
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    const user = userCredential.user;

    // 🔥 SAVE TO FIRESTORE (IMPORTANT)
    await setDoc(doc(db, "users", user.uid), {
      email: email,
      name: email.split("@")[0] // simple name
    });

    // ✅ Success
    msg.style.display = "block";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 2000);

  } catch (error) {
    alert(error.message);
  }
});
</script>
<style>
/* TABLET */
@media (max-width: 1024px) {
  .card {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE */
@media (max-width: 768px) {
  .card {
    grid-template-columns: 1fr;
  }

  h1 {
    font-size: 24px;
  }
}

/* SMALL MOBILE */
@media (max-width: 480px) {
  h1 {
    font-size: 20px;
  }

  p {
    font-size: 14px;
  }
}

/* Desktop */
.container{
  width: 80%;
  margin: auto;
}
</style>
</body>
</html>
