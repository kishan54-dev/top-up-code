<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PHOENIX TK</title>
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="media.css">
<link rel="icon" href="1.jpg">
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>Create Account</h2>
      <p>Sign up to continue</p>
    </div>

    <form id="registerForm" class="login-form">

      <div class="form-group">
        <div class="input-group neu-input">
          <input type="email" id="email" required placeholder=" ">
          <label>Email address</label>
        </div>
      </div>

      <div class="form-group">
        <div class="input-group neu-input">
          <input type="password" id="password" required placeholder=" ">
          <label>Password</label>
        </div>
      </div>

      <button type="submit" class="neu-button login-btn">
        Create Account
      </button>

      <!-- ✅ FIXED success message -->
      <p id="successMsg" class="success-msg" style="display:none; color:rgb(255, 0, 0);">
        Account Created Successfully ✅
      </p>

    </form>

    <div class="signup-link">
      <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

  </div>
</div>

<!-- 🔥 Firebase Register Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyABYByDW8bAOCHfCwcRNaSN1wwifQEhzA4",
  authDomain: "freefiretopup-bbb23.firebaseapp.com",
  projectId: "freefiretopup-bbb23",
  storageBucket: "freefiretopup-bbb23.firebasestorage.app",
  messagingSenderId: "305435218774",
  appId: "1:305435218774:web:d258e8218bd1bdec50fcf7"
};

// ✅ Init Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ Get elements
const form = document.getElementById("registerForm");
const msg = document.getElementById("successMsg");

// ✅ Form submit
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.querySelector("#email").value.trim();
  const password = document.querySelector("#password").value.trim();

  // ✅ Basic validation
  if (password.length < 6) {
    alert("Password must be at least 6 characters");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);

    // ✅ Show success message
    msg.style.display = "block";

    // ✅ Redirect after 2 sec
    setTimeout(() => {
      window.location.href = "index.html";
    }, 2000);

  } catch (error) {
    alert(error.message);
  }
});
</script>

</body>
</html>
