<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Payment</title>

  <link rel="stylesheet" href="payment.css">
  <link rel="icon" href="1.jpg">

  <style>

    .title{
      text-align:center;
      font-size:22px;
      margin-bottom:15px;
      text-shadow:0 0 10px #0ff;
    }

    .info p{
      margin:5px 0;
      font-size:14px;
    }

    .highlight{
      color:#0ff;
    }

    .preview{
      margin-top:10px;
      font-size:13px;
      color:#aaa;
    }

  </style>

</head>

<body>

<div class="container">

  <!-- PAYMENT CARD -->

  <div class="card">

    <div class="title">
      💳 Payment Details
    </div>

    <div class="info">

      <p>
        <b>Account No:</b>
        <span class="highlight">
          134020110640
        </span>
      </p>

      <p>
        <b>Name:</b>
        <span class="highlight">
          JOYTHAS K
        </span>
      </p>

      <p>
        <b>Bank:</b>
        <span class="highlight">
          HNB 🏦
        </span>
      </p>

    </div>

  </div>


  <!-- ORDER CARD -->

  <div class="card">

    <div class="title">
      🎮 Order Details
    </div>


    <!-- UID -->

    <input
    type="text"
    id="uid"
    placeholder="Enter Game UID">


    <!-- TOPUP -->

    <input
    type="text"
    id="diamond"
    readonly>


    <!-- RECEIPT -->

    <div class="upload-box">

      <h2>Upload Receipt</h2>

      <label
      for="photo"
      class="custom-file">

        Choose Receipt

      </label>

      <input
      type="file"
      id="photo">

      <p id="fileText"></p>


      <!-- SUBMIT BUTTON -->

      <button onclick="submitOrder()">

        Submit Top Up

      </button>

      <p id="msg"></p>

    </div>


    <!-- INFO -->

    <div class="preview">

      📌 Complete payment and upload receipt to confirm your order.

    </div>

  </div>

</div>



<script>


// FILE SELECT TEXT

const photo =
document.getElementById("photo");

const fileText =
document.getElementById("fileText");

photo.addEventListener("change", ()=>{

 fileText.innerText =
 "Receipt Selected ✅";

});




// BACK BUTTON

function goBack(){

 window.location.href =
 "home.html";

}




// AUTO FILL TOPUP

window.onload = function(){

 const item =
 localStorage.getItem("selectedTopup");

 if(item){

  document.getElementById("diamond").value =
  item;

 }

};




// MAIN SUBMIT FUNCTION

async function submitOrder(){


 // INPUTS

 const uidInput =
 document.getElementById("uid");

 const uid =
 uidInput.value;

 const item =
 document.getElementById("diamond").value;

 const file =
 document.getElementById("photo").files[0];

 const msg =
 document.getElementById("msg");



 // RESET

 uidInput.classList.remove("error");

 uidInput.classList.remove("success");



 // UID CHECK

 if(uid === ""){

  uidInput.classList.add("error");

  uidInput.placeholder =
  "⚠ Enter UID";

  return;

 }else{

  uidInput.classList.add("success");

 }



 // RECEIPT CHECK

 if(!file){

  msg.innerText =
  "Select Receipt ⚠";

  msg.style.opacity = "1";

  setTimeout(()=>{

   msg.style.opacity = "0";

  },1000);

  return;

 }



 // SEND DATA TO NETLIFY BACKEND

 await fetch(

 "https://phoenix-jk.netlify.app/.netlify/functions/send",

 {

  method:"POST",

  headers:{
   "Content-Type":"application/json"
  },

  body: JSON.stringify({

   uid: uid,

   item: item

  })

 }

 );



 // SUCCESS MESSAGE

 msg.innerText =
 "Sent To Admin ✅";

 msg.style.opacity = "1";

 setTimeout(()=>{

  msg.style.opacity = "0";

 },1000);




 // WHATSAPP MESSAGE

 const number =
 "94771945590";


 const message =

`Hi Bro,
UID: ${uid}
Selected: ${item}
Payment Done.`;


 const url =

 "https://wa.me/" +
 number +
 "?text=" +
 encodeURIComponent(message);




 // OPEN WHATSAPP

 window.location.href =
 url;

}


</script>

</body>
</html>
